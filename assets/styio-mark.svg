<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Styio mark</title>
  <desc id="desc">Five mirrored letter cards forming the Styio mark.</desc>
  <rect width="64" height="64" rx="14" fill="#111827"/>
  <g filter="url(#shadow)">
    <g transform="translate(4 19) rotate(-10 9 13)">
      <rect width="18" height="28" rx="4" fill="#f9fafb"/>
      <text x="-9" y="19.5" transform="scale(-1 1)" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">S</text>
    </g>
    <g transform="translate(15 13) rotate(6 9 13)">
      <rect width="18" height="28" rx="4" fill="#22c55e"/>
      <text x="-9" y="19.5" transform="scale(-1 1)" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle">T</text>
    </g>
    <g transform="translate(26 19) rotate(-5 9 13)">
      <rect width="18" height="28" rx="4" fill="#f9fafb"/>
      <text x="-9" y="19.5" transform="scale(-1 1)" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">Y</text>
    </g>
    <g transform="translate(36 13) rotate(8 9 13)">
      <rect width="18" height="28" rx="4" fill="#bbf7d0"/>
      <text x="-9" y="19.5" transform="scale(-1 1)" fill="#14532d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle">I</text>
    </g>
    <g transform="translate(44 21) rotate(-8 9 13)">
      <rect width="18" height="28" rx="4" fill="#f9fafb"/>
      <text x="-9" y="19.5" transform="scale(-1 1)" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">O</text>
    </g>
  </g>
  <defs>
    <filter id="shadow" x="0" y="8" width="66" height="48" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
</svg>
