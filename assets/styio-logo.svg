<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 54" role="img" aria-labelledby="title desc">
  <title id="title">Styio logo</title>
  <desc id="desc">Five mirrored letter cards spelling Styio.</desc>
  <g filter="url(#shadow)">
    <g transform="translate(5 9) rotate(-8 13 18)">
      <rect width="28" height="38" rx="6" fill="#111827"/>
      <text x="-14" y="26" transform="scale(-1 1)" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850" text-anchor="middle">S</text>
      <path d="M6 31h16" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(38 5) rotate(5 13 18)">
      <rect width="28" height="38" rx="6" fill="#22c55e"/>
      <text x="-14" y="26" transform="scale(-1 1)" fill="#052e16" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900" text-anchor="middle">T</text>
      <path d="M6 31h16" stroke="#052e16" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(72 9) rotate(-4 13 18)">
      <rect width="28" height="38" rx="6" fill="#f9fafb"/>
      <text x="-14" y="26" transform="scale(-1 1)" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850" text-anchor="middle">Y</text>
      <path d="M6 31h16" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(106 5) rotate(6 13 18)">
      <rect width="28" height="38" rx="6" fill="#bbf7d0"/>
      <text x="-14" y="26" transform="scale(-1 1)" fill="#14532d" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="900" text-anchor="middle">I</text>
      <path d="M6 31h16" stroke="#14532d" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(140 9) rotate(-6 13 18)">
      <rect width="28" height="38" rx="6" fill="#111827"/>
      <text x="-14" y="26" transform="scale(-1 1)" fill="#f9fafb" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="850" text-anchor="middle">O</text>
      <path d="M6 31h16" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  <defs>
    <filter id="shadow" x="0" y="0" width="176" height="54" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#020617" flood-opacity="0.18"/>
    </filter>
  </defs>
</svg>
